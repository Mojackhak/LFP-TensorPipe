name: Release Python

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing annotated Git tag to package and release
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-python-release:
    name: Build Draft Python Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag_name="${INPUT_RELEASE_TAG}"
          else
            tag_name="${GITHUB_REF_NAME}"
          fi

          if [ -z "${tag_name}" ]; then
            echo "release tag is required" >&2
            exit 1
          fi

          git fetch --tags --force
          git rev-parse "refs/tags/${tag_name}" >/dev/null
          tag_type="$(git for-each-ref "refs/tags/${tag_name}" --format='%(objecttype)')"
          if [ "${tag_type}" != "tag" ]; then
            echo "public release tags must be annotated so the workflow can read the curated release body" >&2
            exit 1
          fi
          git checkout "refs/tags/${tag_name}"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"

      - name: Resolve annotated release notes
        id: notes
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          notes_path="${RUNNER_TEMP}/release-notes.md"
          git for-each-ref "refs/tags/${RELEASE_TAG}" --format='%(contents)' > "${notes_path}"
          export NOTES_PATH="${notes_path}"
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          import sys

          path = Path(os.environ["NOTES_PATH"])
          text = path.read_text(encoding="utf-8").strip()
          if not text:
              raise SystemExit("annotated release notes are required")

          placeholder_patterns = (
              r"\bTODO\b",
              r"\bTBD\b",
              r"\[\[COMMENT:",
              r"<fill",
          )
          for pattern in placeholder_patterns:
              if re.search(pattern, text, flags=re.IGNORECASE):
                  raise SystemExit(
                      "annotated release notes still contain placeholder text"
                  )
          PY
          echo "notes_path=${notes_path}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Upgrade pip and install build tool
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ steps.release.outputs.tag_name }}
          path: dist/*

      - name: Create or update draft GitHub release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
          RELEASE_NOTES_PATH: ${{ steps.notes.outputs.notes_path }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const tag = process.env.RELEASE_TAG;
            const notesPath = process.env.RELEASE_NOTES_PATH;
            const body = fs.readFileSync(notesPath, "utf8");
            const { owner, repo } = context.repo;

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                tag_name: tag,
                name: tag,
                body,
                draft: existing.data.draft,
                prerelease: existing.data.prerelease,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: tag,
                body,
                draft: true,
                prerelease: false,
                generate_release_notes: false,
              });
            }

      - name: Upload Python artifacts to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: gh release upload "${RELEASE_TAG}" dist/* --clobber
