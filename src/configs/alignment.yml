      annotations: []
      pad_left: 0.5
      anno_left: 0.5
      anno_right: 0.5
      pad_right: 0.5
      duration_range:
      - 0.0
      - 1000000.0
      drop_bad: true
      drop_fields:
      - bad
      - edge
      sample_rate: 50.0
    stack_warper:
      annotations: []
      duration_range:
      - 0.0
      - 1000000.0
      drop_bad: true
      drop_fields:
      - bad
      - edge
      sample_rate: 5.0
    concat_warper:
      annotations: []
      duration_range:
      - 0.0
      - 1000000.0
      drop_bad: true
      drop_fields:
      - bad
      - edge
      sample_rate: 50.0
