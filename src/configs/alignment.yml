        50.0: strike_R
        100.0: strike_L
      epoch_duration_range:
      - 0.6
      - 2.0
      linear_warp: true
      percent_tolerance: 15.0
      drop_bad: true
      drop_fields:
      - bad
      - edge
      sample_rate: 5.0
